<svg width="900" height="140" viewBox="0 0 900 140" xmlns="http://www.w3.org/2000/svg">
  <style>
    .neighbor { fill: #1f4e79; }
    .hub { fill: #57C84D; }
    .subtitle { fill: #444444; font-size: 28px; font-weight: 500; }
  </style>
  <!-- use local header-icon.png (same folder) for reliable rendering -->
  <image href="header-icon.png" x="0" y="20" height="100" preserveAspectRatio="xMidYMid meet"/>
  <!-- align text to the right of the icon; x tuned for spacing -->
  <text x="160" y="70" font-family="Segoe UI, Arial, sans-serif" font-size="64" font-weight="700">
    <tspan class="neighbor">Neighbor</tspan><tspan class="hub">Hub</tspan>
  </text>
  <text x="162" y="115" class="subtitle" font-family="Segoe UI, Arial, sans-serif">
    A Lightweight Community Board
  </text>
</svg>